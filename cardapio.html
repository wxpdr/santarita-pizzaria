<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio | Santa Rita Pizzaria</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body>

    <main class="menu-page">
        <section class="menu-card">

            <header class="menu-header">
                <a href="index.html" class="back-link">← Voltar ao início</a>
                <img src="img/logo-branca.png" alt="Logo Pizzaria Santa Rita" class="menu-logo">
                <h1>Cardápio Digital</h1>
            </header>

            <nav class="menu-categories" aria-label="Categorias do cardápio">
                <button class="category-btn active" data-category="salgadas">Salgadas</button>
                <button class="category-btn" data-category="doces">Doces</button>
                <button class="category-btn" data-category="bebidas">Bebidas</button>
            </nav>

            <section id="salgadas" class="menu-section active-section">
                <h2>Pizzas Salgadas</h2>
                <div class="menu-list" data-list="salgadas"></div>
            </section>

            <section id="doces" class="menu-section">
                <h2>Pizzas Doces</h2>
                <div class="menu-list" data-list="doces"></div>
            </section>

            <section id="bebidas" class="menu-section">
                <h2>Bebidas</h2>
                <div class="menu-list" data-list="bebidas"></div>
            </section>

        </section>
    </main>

    <script src="js/cardapio.js"></script>
</body>
</html>
